---
layout: default
---
<article class="shoreline-masthead-layout">
  <section class="shoreline-masthead-content ps-sailcloth">
    <div class="shell shoreline-content-inner">
      {%- if page.show_header != false and page.title -%}
        <header class="shoreline-page-header">
          <h1>{{ page.title | escape }}</h1>
        </header>
      {%- endif -%}

      <div class="shoreline-page-content">
        {{ content }}
      </div>
    </div>
  </section>
</article>
